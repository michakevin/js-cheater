<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>RPG Maker Editor – JS-Cheater</title>
    <link rel="stylesheet" href="rpgmaker-data-editor.css" />
  </head>
  <body>
    <header class="editor-header">
      <h1>🎮 RPG Maker Editor</h1>
      <p class="editor-subtitle">Spielwerte und Items live bearbeiten</p>
    </header>

    <div class="editor-tabs" role="tablist">
      <button class="tab-btn active" data-tab="values" role="tab" aria-selected="true">
        📊 Spielwerte
      </button>
      <button class="tab-btn" data-tab="items" role="tab" aria-selected="false">
        🎒 Items
      </button>
    </div>

    <div id="statusMessage" class="status-message hidden"></div>

    <!-- Spielwerte Tab -->
    <div id="valuesTab" class="tab-panel active">
      <div class="panel-toolbar">
        <input
          id="valuesSearch"
          type="text"
          placeholder="🔍 Variable oder Schalter suchen…"
          aria-label="Variablen filtern"
        />
        <button id="refreshValues" class="btn-refresh">🔄 Laden</button>
      </div>
      <div id="valuesContent" class="panel-content">
        <div class="empty-state">
          <p>📊 Klicke auf "Laden" um die Spielwerte zu laden.</p>
          <p class="text-secondary">Der Scanner muss aktiv sein.</p>
        </div>
      </div>
    </div>

    <!-- Items Tab -->
    <div id="itemsTab" class="tab-panel hidden">
      <div class="panel-toolbar">
        <input
          id="itemsSearch"
          type="text"
          placeholder="🔍 Item suchen…"
          aria-label="Items filtern"
        />
        <button id="refreshItems" class="btn-refresh">🔄 Laden</button>
      </div>
      <div class="item-type-filter" role="group" aria-label="Item-Kategorie">
        <button class="filter-btn active" data-type="items">🧪 Items</button>
        <button class="filter-btn" data-type="weapons">⚔️ Waffen</button>
        <button class="filter-btn" data-type="armors">🛡️ Rüstungen</button>
      </div>
      <div id="itemsContent" class="panel-content">
        <div class="empty-state">
          <p>🎒 Klicke auf "Laden" um die Items zu laden.</p>
        </div>
      </div>
    </div>

    <script type="module" src="rpgmaker-data-editor.js"></script>
  </body>
</html>
